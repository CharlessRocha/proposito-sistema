<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colégio Propósito — Painel do Gerente</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}

  /* NAV */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#1a1d27;border-bottom:1px solid #2a2d3a;position:sticky;top:0;z-index:50}
  .nav-logo{color:#F5C842;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .nav-modulo{font-size:12px;color:#888;background:#12141e;padding:3px 10px;border-radius:20px;border:1px solid #2a2d3a}
  .nav-back{font-size:12px;color:#888;background:none;border:1px solid #2a2d3a;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit}
  .nav-back:hover{color:#F5C842;border-color:#F5C842}

  /* MAIN */
  .main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
  .page-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
  .page-sub{font-size:13px;color:#666;margin-bottom:1.5rem}

  /* TABS */
  .tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#1a1d27;border-radius:8px;padding:4px;border:1px solid #2a2d3a}
  .tab{flex:1;padding:8px 6px;border:none;background:transparent;border-radius:6px;font-size:12px;font-weight:500;color:#888;cursor:pointer;text-align:center;font-family:inherit}
  .tab.active{background:#252840;color:#fff;border:1px solid #2a2d3a}
  .panel{display:none}.panel.active{display:block}

  /* IMPORT */
  .import-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
  .iz{border:1.5px dashed #2a2d3a;border-radius:10px;padding:12px;cursor:pointer;background:#1a1d27;text-align:center;transition:border-color .15s}
  .iz:hover{border-color:#F5C842}
  .iz.loaded{border-color:#22c55e;background:#0f2a1a}
  .iz-icon{font-size:20px;margin-bottom:4px}
  .iz-title{font-size:12px;font-weight:500;color:#ddd}
  .iz-sub{font-size:10px;color:#666;margin-top:2px}
  .iz-ok{font-size:10px;color:#22c55e;font-weight:500;margin-top:3px;display:none}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
  .kpi{background:#1a1d27;border-radius:8px;padding:12px;border:1px solid #2a2d3a}
  .kpi-label{font-size:10px;color:#666;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
  .kpi-val{font-size:20px;font-weight:700;color:#fff}
  .kpi-sub{font-size:10px;color:#888;margin-top:2px}
  .kpi.success .kpi-val{color:#22c55e}
  .kpi.warning .kpi-val{color:#f59e0b}
  .kpi.danger .kpi-val{color:#ef4444}
  .kpi.accent .kpi-val{color:#F5C842}

  /* ALERT */
  .alert-box{background:#2a1515;border:1px solid #ef4444;border-radius:8px;padding:12px 14px;margin-bottom:1.25rem;display:none}
  .alert-box.show{display:block}
  .alert-title{font-size:12px;font-weight:600;color:#ef4444;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .alert-item{font-size:12px;color:#fca5a5;padding:3px 0;display:flex;align-items:flex-start;gap:8px}

  /* CARD */
  .card{background:#1a1d27;border-radius:10px;border:1px solid #2a2d3a;overflow:hidden;margin-bottom:12px}
  .card-head{padding:11px 14px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;justify-content:space-between;background:#1f2235}
  .card-title{font-size:13px;font-weight:600;color:#ddd;display:flex;align-items:center;gap:6px}
  .card-body{padding:14px}

  /* FUNIL */
  .funil-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #2a2d3a}
  .funil-row:last-child{border-bottom:none}
  .funil-nome{font-size:12px;color:#aaa;flex:1}
  .funil-bar-wrap{width:90px;height:5px;background:#12141e;border-radius:3px;overflow:hidden;flex-shrink:0}
  .funil-bar{height:5px;border-radius:3px}
  .funil-num{font-size:14px;font-weight:600;color:#fff;min-width:28px;text-align:right}
  .funil-pct{font-size:10px;color:#666;min-width:30px;text-align:right}

  /* MAIN GRID */
  .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

  /* DATA ITEM */
  .data-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #2a2d3a;font-size:12px}
  .data-item:last-child{border-bottom:none}
  .data-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;min-width:50px;text-align:center}
  .db-urgente{background:#2a1515;color:#ef4444}
  .db-proximo{background:#2a1e0f;color:#f59e0b}
  .db-futuro{background:#1a1f35;color:#F5C842}
  .db-passado{background:#1a1d27;color:#555}
  .data-desc{color:#ccc;flex:1}
  .data-quando{font-size:10px;color:#666;flex-shrink:0}

  /* PLAY ROW */
  .play-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #2a2d3a}
  .play-row:last-child{border-bottom:none}
  .play-fase{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;flex-shrink:0;text-transform:uppercase}
  .pf-plan{background:#1a1535;color:#a78bfa}
  .pf-pre{background:#1a1f35;color:#F5C842}
  .pf-dia{background:#2a1e0f;color:#f59e0b}
  .pf-pos{background:#0f2a1a;color:#22c55e}
  .play-nome{font-size:12px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .play-prazo{font-size:10px;padding:1px 6px;border-radius:20px;flex-shrink:0}
  .pp-urgente{background:#2a1515;color:#ef4444}
  .pp-proximo{background:#2a1e0f;color:#f59e0b}
  .pp-ok{background:#0f2a1a;color:#22c55e}
  .pp-neutro{background:#1a1d27;color:#666;border:1px solid #2a2d3a}

  /* ENT ROW */
  .ent-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #2a2d3a;font-size:12px}
  .ent-item:last-child{border-bottom:none}
  .ep-at{background:#2a1515;color:#ef4444}
  .ep-pl{background:#1a1f35;color:#F5C842}
  .ent-nome{flex:1;color:#ddd;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ent-info{font-size:10px;color:#666;flex-shrink:0}

  /* SECTION LABEL */
  .section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#555;margin-bottom:8px;margin-top:14px}
  .section-label:first-child{margin-top:0}

  /* DIST */
  .dist-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #2a2d3a;font-size:12px}
  .dist-item:last-child{border-bottom:none}
  .dist-label{color:#aaa;flex:1}
  .dist-val{font-weight:600;color:#fff}
  .dist-pct{font-size:10px;color:#666;min-width:30px;text-align:right}

  /* MARCAR BTN */
  .marcar-btn{font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid #22c55e;background:#0f2a1a;color:#22c55e;cursor:pointer;white-space:nowrap;font-family:inherit}
  .marcar-btn:hover{background:#22c55e;color:#0f1117}

  .empty{padding:20px;text-align:center;font-size:13px;color:#555}
  .badge-small{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;margin-left:4px}
</style>

<script>
// AUTH
if(sessionStorage.getItem('acesso_gerente')!=='1'){
  document.getElementById('auth-check').style.display='flex';
}

const HOJE = new Date(); HOJE.setHours(0,0,0,0);
const HOJE_STR = HOJE.toISOString().split('T')[0];

const SELETIVOS_DEFAULT = [
  {n:1,data:'28/jun/2026',obs:''},{n:2,data:'12/jul/2026',obs:''},{n:3,data:'02/ago/2026',obs:''},

  {n:11,data:'13/dez/2026',obs:''},{n:12,data:'10/jan/2027',obs:'Alta urgência'},
  {n:13,data:'24/jan/2027',obs:'Alta urgência'},{n:14,data:'—',obs:''},{n:15,data:'—',obs:''},
];

const FASES_DEF=[
  {id:'plan',badge:'plan',label:'Planejamento',tarefas:[
    {id:'p1',nome:'Confirmar condição comercial e premiação',resp:'Gerente',dRel:-14,alerta:true},
    {id:'p2',nome:'Reunião com marketing — meta de leads',resp:'Gerente',dRel:-14,alerta:true},

    {id:'p5',nome:'Confirmar conteúdo jornada semana 1',resp:'Analista',dRel:-10,alerta:true},
  ]},
  {id:'pre',badge:'pre',label:'Pré-seletivo',tarefas:[
    {id:'pre1',nome:'Confirmar saldo telefonia (URA/discador/SMS)',resp:'Analista',dRel:-7,alerta:true},
    {id:'pre2',nome:'Alocar CDRs conforme volume de inscritos',resp:'Gerente',dRel:-7},
    {id:'pre3',nome:'Confirmar provas + cartão resposta na gráfica',resp:'Gerente',dRel:-7,alerta:true},
    {id:'pre5',nome:'Montar escala do seletivo por unidade',resp:'Gerente',dRel:-6},
    {id:'pre7',nome:'Confirmar escala dos outros setores',resp:'Gerente',dRel:-4,alerta:true},
    {id:'pre9',nome:'Acompanhar meta de confirmação CDR (80%)',resp:'Gerente',dRel:-3,alerta:true},
    {id:'pre10',nome:'Acionar URA + discador + SMS + Blip',resp:'Analista',dRel:-3},
    {id:'pre14',nome:'Organizar salas com todos os materiais',resp:'Assistente',dRel:-1},
    {id:'pre15',nome:'Reunião de alinhamento com a equipe',resp:'Gerente',dRel:-1},
  ]},
  {id:'dia',badge:'dia',label:'Dia D',tarefas:[
    {id:'d5',nome:'Lançar notas no sistema',resp:'Gerente',dRel:0,alerta:true},
    {id:'d6',nome:'Atualizar infantil manualmente no Rubeus',resp:'Analista',dRel:0,alerta:true},
    {id:'d7',nome:'Confirmar fotos das propostas no grupo',resp:'Gerente',dRel:0,alerta:true},
  ]},
  {id:'pos',badge:'pos',label:'Pós-seletivo',tarefas:[
    {id:'ps1',nome:'Atualizar filtros no Rubeus',resp:'Analista',dRel:1,alerta:true},
    {id:'ps3',nome:'Iniciar acionamento inside sales',resp:'Analista',dRel:1,alerta:true},
    {id:'ps4',nome:'Cadastrar propostas físicas',resp:'Assistente',dRel:1,alerta:true},
    {id:'ps9',nome:'War Room diário — meta de agendamentos',resp:'Analista',dRel:5},
    {id:'ps10',nome:'Closer recebe leads em Negociação',resp:'Closer',dRel:6,alerta:true},
    {id:'ps11',nome:'Relatório de resultado do seletivo',resp:'Gerente',dRel:7},
  ]},
];

const ETAPA_ORDER=['Inscrito','Confirmado no Teste','Não Compareceu no Teste','Compareceu no Teste','Entrevista Agendada','Proposta','Negociação','Matrícula'];
const ETAPA_COR={'Inscrito':'#3b82f6','Confirmado no Teste':'#f59e0b','Não Compareceu no Teste':'#ef4444','Compareceu no Teste':'#22c55e','Entrevista Agendada':'#a78bfa','Proposta':'#38bdf8','Negociação':'#fb923c','Matrícula':'#22c55e'};

let leads=[], propostas=[], atividades=[], tarefas={}, seletivos=[], mapaProcessos=[], tarefasCustom=[];

// Combina tarefas padrão com as customizações salvas no Playbook (edições/exclusões/adições)
function todasTarefasComFase(){
  const todasPadrao=[];
  FASES_DEF.forEach(f=>f.tarefas.forEach(ta=>todasPadrao.push({...ta,fase:f.id})));
  const custom = tarefasCustom.filter(t=>!todasPadrao.find(p=>p.id===t.id));
  const editadas = tarefasCustom.filter(t=>todasPadrao.find(p=>p.id===t.id));
  return todasPadrao.map(t=>{
    const edit=editadas.find(e=>e.id===t.id);
    return edit?{...edit,fase:edit.fase||t.fase}:t;
  }).concat(custom).filter(t=>!t.excluida);
}

// Converte código do Rubeus em nome amigável configurado
function nomeAmigavel(processo){
  if(!processo) return processo;
  const m = mapaProcessos.find(m=>m.codigo&&processo.trim()===m.codigo.trim());
  if(m&&m.nome) return m.nome;
  // fallback: limpa o código
  return processo.replace('TS ','').replace('(PROPOSITO ','(').replace('(CENTRO/SUL ','(C.Sul ');
}

let etapasFunil=[];
const NIVEIS_PADRAO={
  'Inscrito':'neutra','Confirmado no Teste':'neutra','Não Compareceu no Teste':'neutra',
  'Compareceu no Teste':'progresso','Entrevista Agendada':'progresso',
  'Proposta':'positiva','Negociação':'positiva','Matrícula':'sucesso'
};
function nivelEtapa(etapa){
  const cfg=etapasFunil.find(e=>e.etapa===etapa);
  if(cfg) return cfg.nivel;
  return NIVEIS_PADRAO[etapa]||'neutra';
}
function isEngajado(etapa){
  const n=nivelEtapa(etapa);
  return n==='positiva'||n==='sucesso';
}

function parseData(str){
  if(!str||str==='—')return null;
  const m=str.match(/(\d+)\/(\w+)\/(\d+)/);
  if(!m)return null;
  const meses={jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};
  return new Date(parseInt(m[3]),meses[m[2].toLowerCase()]||0,parseInt(m[1]));
}
function diasAte(d){if(!d)return null;return Math.round((d-HOJE)/(1000*60*60*24));}
function dataRel(base,dRel){if(!base)return null;const d=new Date(base);d.setDate(d.getDate()+dRel);return d;}
function fmtData(d){if(!d)return'—';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
function prazoCor(base,dRel){
  const d=dataRel(base,dRel);if(!d)return'neutro';
  const diff=Math.round((d-HOJE)/(1000*60*60*24));
  if(diff<0)return'urgente';if(diff<=3)return'proximo';if(diff<=7)return'ok';return'neutro';
}
function getTarefas(id){if(!tarefas[id])tarefas[id]={};return tarefas[id];}
function compareceuReal(etapa){return['Compareceu no Teste','Entrevista Agendada','Proposta','Negociação','Matrícula'].includes(etapa);}
// Adapta lead do Supabase para formato original
function adaptLead(l){ return {'Nome da pessoa':l.nome,'Etapa':l.etapa,'Status':l.status,'Processo seletivo':l.processo,'Unidade':l.unidade,'Nome - Oferta de curso':l.oferta,'Turno':l.turno,'Data da criação':l.data_criacao,'Código de Inscrição':l.codigo_inscricao}; }
function adaptAtv(a){ return {'Contato':a.contato,'Atividade':a.atividade,'Status':a.status,'Etapa':a.etapa,'Nome - Processo seletivo':a.processo,'Unidade':a.unidade,'Nome - Oferta de curso':a.oferta,'Data de vencimento':a.data_vencimento,'Responsável':a.responsavel}; }
function adaptProp(p){ return {'Aluno':p.aluno,'Série':p.serie,'Unidade':p.unidade,'Status':p.status,'COD. Inscrição':p.cod_inscricao,'Mensalidade à Vista (%)':p.mensalidade_vista,'Percentual de Desconto da Mensalidade (%)':p.desconto_mensalidade,'Matrícula à Vista (%)':p.matricula_vista,'Percentual de Desconto da Matrícula (%)':p.desconto_matricula,'Cadastrado Por':p.cadastrado_por}; }
function seletivoAtivo(){
  return seletivos.find(s=>{const d=parseData(s.data);if(!d)return false;const dias=diasAte(d);return dias>=-7&&dias<=15;})
    ||seletivos.find(s=>{const d=parseData(s.data);return d&&diasAte(d)>0;});
}

async function init(){
  document.getElementById('data-hoje').textContent=HOJE.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  // Carrega tarefas do Supabase
  const tarefasDB = await supa.getTarefas();
  tarefasDB.forEach(t=>{ if(!tarefas[t.sel_id])tarefas[t.sel_id]={}; tarefas[t.sel_id][t.tarefa_id]=t.concluida; });
  // Carrega dados do Supabase
  leads = await supa.getLeads();
  if(leads.length) marcarOk('reg',leads.length);
  propostas = await supa.getPropostas();
  if(propostas.length) marcarOk('prop',propostas.length);
  atividades = await supa.getAtividades();
  if(atividades.length) marcarOk('atv',atividades.length);
  // Seletivos e mapa de nomes do Supabase
  const cfgSel = await supa.getConfig('seletivos');
  if(cfgSel) seletivos = cfgSel;
  if(!seletivos.length) seletivos = SELETIVOS_DEFAULT;
  mapaProcessos = await supa.getConfig('mapa_processos') || [];
  etapasFunil = await supa.getConfig('etapas_funil') || [];
  tarefasCustom = await supa.getConfig('tarefas_custom') || [];
  renderTudo();
}

function marcarOk(tipo,n){
  const ok=document.getElementById('ok-'+tipo);
  if(ok){ok.style.display='block';ok.textContent=`✓ ${n} registros`;}
  const iz=document.getElementById('iz-'+tipo);
  if(iz){iz.style.borderColor='#22c55e';iz.style.background='#0f2a1a';}
}

async function lerCSV(inp,tipo){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    const linhas=e.target.result.split('\n').filter(l=>l.trim());
    const header=linhas[0].split(';').map(h=>h.replace(/^"|"$/g,'').trim());
    const rows=linhas.slice(1).map(l=>{const cols=l.split(';').map(c=>c.replace(/^"|"$/g,'').trim());const obj={};header.forEach((h,i)=>obj[h]=cols[i]||'');return obj;});
    if(tipo==='reg'){
      leads=rows.filter(r=>r['Nome da pessoa']&&r['Nome da pessoa']!='- - -');
      marcarOk('reg',leads.length+' (salvando...)');
      await supa.salvarLeads(leads);
      marcarOk('reg',leads.length);
    } else {
      atividades=rows.filter(r=>r['Contato']&&r['Contato']!='- - -');
      marcarOk('atv',atividades.length+' (salvando...)');
      await supa.salvarAtividades(atividades);
      marcarOk('atv',atividades.length);
    }
    renderTudo();
  };
  r.readAsText(f,'ISO-8859-1');
}

async function lerProp(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    const doc=(new DOMParser()).parseFromString(e.target.result,'text/html');
    const rows=[...doc.querySelectorAll('tr')];
    if(rows.length<2)return;
    const headers=[...rows[1].querySelectorAll('td')].map(td=>td.textContent.trim());
    propostas=rows.slice(2).map(row=>{const cells=[...row.querySelectorAll('td')].map(td=>td.textContent.trim());const obj={};headers.forEach((h,i)=>obj[h]=cells[i]||'');return obj;}).filter(p=>p['Aluno']&&p['Status']==='ATIVO');
    marcarOk('prop',propostas.length+' (salvando...)');
    await supa.salvarPropostas(propostas);
    marcarOk('prop',propostas.length);
    renderTudo();
  };
  r.readAsText(f,'latin-1');
}

function getProcessoSel(){ return document.getElementById('sel-processo')?.value||''; }

function popularProcessos(){
  const sel = document.getElementById('sel-processo');
  if(!sel) return;
  // Pega códigos únicos dos leads E das atividades
  const deLeads = leads.map(l=>l['Processo seletivo']);
  const deAtiv = atividades.map(a=>a['Nome - Processo seletivo']);
  const codigos = [...new Set([...deLeads,...deAtiv].filter(p=>p&&p!='- - -'&&p!=''))];
  // Agrupa por nome amigável — vários códigos podem compartilhar o mesmo nome
  const grupos = {};
  codigos.forEach(cod=>{
    const nome = nomeAmigavel(cod);
    if(!grupos[nome]) grupos[nome]=[];
    grupos[nome].push(cod);
  });
  const nomesOrdenados = Object.keys(grupos).sort();
  const atual = sel.value;
  sel.innerHTML = '<option value="">Todos os seletivos</option>' + 
    nomesOrdenados.map(nome=>`<option value="${nome}" ${nome===atual?'selected':''}>${nome}</option>`).join('');
  // Guarda o mapeamento nome→códigos globalmente para uso nos filtros
  window._gruposSeletivo = grupos;
}

// Retorna true se o processo do lead/atividade pertence ao grupo selecionado
function pertenceAoGrupo(processoLead, nomeGrupoSelecionado){
  if(!nomeGrupoSelecionado) return true; // "Todos" selecionado
  const grupos = window._gruposSeletivo || {};
  const codigos = grupos[nomeGrupoSelecionado] || [];
  return codigos.some(c=>c.trim()===(processoLead||'').trim());
}

function getLeadsFiltrados(){
  const proc = getProcessoSel();
  let lista = leads.filter(l=>l['Status']!=='Perdido');
  if(proc) lista = lista.filter(l=>pertenceAoGrupo(l['Processo seletivo'], proc));
  return lista;
}

function renderTudo(){popularProcessos();renderKPIs();renderAlertas();renderDatas();renderPlaybook();renderFunil();renderEntrevistas();}

function renderKPIs(){
  const proc=getProcessoSel();
  const filtrados=getLeadsFiltrados(); // já filtra Status!=='Perdido' e pelo grupo do seletivo
  const total=filtrados.length;
  const perdidos=leads.filter(l=>l['Status']==='Perdido'&&pertenceAoGrupo(l['Processo seletivo'],proc)).length;
  // Taxa de engajamento real: conta leads em etapas positivas ou de sucesso (Proposta, Negociação, Matrícula)
  const engajados=filtrados.filter(l=>isEngajado(l['Etapa'])).length;
  const matriculas=filtrados.filter(l=>l['Etapa']==='Matrícula').length;
  const entAtrasadas=atividades.filter(a=>a['Status']==='Atrasada'&&pertenceAoGrupo(a['Nome - Processo seletivo'],proc)).length;
  const atividadesFiltradas=atividades.filter(a=>pertenceAoGrupo(a['Nome - Processo seletivo'],proc));
  const propostasFiltradas=proc?propostas.filter(p=>{
    const lead=leads.find(l=>(l['Nome da pessoa']||'').toLowerCase().trim()===(p['Aluno']||'').toLowerCase().trim());
    return lead?pertenceAoGrupo(lead['Processo seletivo'],proc):false;
  }):propostas;
  const taxaEngaj=total>0?Math.round(engajados/total*100):0;
  const countEl=document.getElementById('sel-count');
  if(countEl)countEl.textContent=proc?`${total} leads neste seletivo`:`${total} leads no total`;
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi accent"><div class="kpi-label">Leads ativos</div><div class="kpi-val">${total}</div><div class="kpi-sub">${perdidos} perdidos ocultos</div></div>
    <div class="kpi ${taxaEngaj>=30?'success':taxaEngaj>=15?'warning':'danger'}"><div class="kpi-label">Taxa de engajamento</div><div class="kpi-val">${total?taxaEngaj+'%':'—'}</div><div class="kpi-sub">${engajados} em Proposta/Negociação</div></div>
    <div class="kpi ${matriculas>0?'success':'warning'}"><div class="kpi-label">Matrículas</div><div class="kpi-val">${matriculas||'—'}</div><div class="kpi-sub">Taxa ${total?Math.round(matriculas/total*100):0}%</div></div>
    <div class="kpi ${entAtrasadas>0?'danger':'success'}"><div class="kpi-label">Ent. atrasadas</div><div class="kpi-val">${atividadesFiltradas.length?entAtrasadas:'—'}</div><div class="kpi-sub">de ${atividadesFiltradas.length} agendadas</div></div>
    <div class="kpi accent"><div class="kpi-label">Propostas</div><div class="kpi-val">${propostasFiltradas.length||'—'}</div><div class="kpi-sub">cadastradas</div></div>`;
}

function renderAlertas(){
  const sa=seletivoAtivo();
  const items=[];
  if(sa){
    const d=parseData(sa.data);const t=getTarefas(`sel_${sa.n}`);
    todasTarefasComFase().forEach(ta=>{
      if(!t[ta.id]&&ta.alerta){const cor=prazoCor(d,ta.dRel);if(cor==='urgente'||cor==='proximo')items.push({ta,d,selId:`sel_${sa.n}`,cor});}
    });
  }
  atividades.filter(a=>a['Status']==='Atrasada').forEach(a=>items.push({tipo:'ent',nome:a['Contato'],desc:`Entrevista atrasada — venceu ${a['Data de vencimento']}`}));
  const ab=document.getElementById('alert-box');
  if(items.length){
    ab.classList.add('show');
    document.getElementById('alert-list').innerHTML=items.slice(0,5).map(it=>
      it.tipo==='ent'?`<div class="alert-item">⚡ <span><strong>${it.nome}</strong> — ${it.desc}</span></div>`:
      `<div class="alert-item" style="justify-content:space-between">⚡ <span style="flex:1"><strong>${it.ta.resp}:</strong> ${it.ta.nome} — D${it.ta.dRel>=0?'+':''}${it.ta.dRel}=${fmtData(dataRel(it.d,it.ta.dRel))}</span><button class="marcar-btn" onclick="marcarTarefa('${it.selId}','${it.ta.id}')">Feita</button></div>`
    ).join('');
  } else ab.classList.remove('show');
}

function renderDatas(){
  // Pega as tarefas pendentes de TODOS os seletivos ativos (janela -3 a +15 dias)
  const tarefasUrgentes=[];
  const todas=todasTarefasComFase();
  seletivos.forEach(s=>{
    const d=parseData(s.data);if(!d)return;
    const diasSel=diasAte(d);
    if(diasSel<-15||diasSel>30)return; // só considera seletivos relevantes agora
    const selId=`sel_${s.n}`;
    const t=getTarefas(selId);
    todas.forEach(ta=>{
      if(t[ta.id])return; // já concluída
      const dataTarefa=dataRel(d,ta.dRel);
      if(!dataTarefa)return;
      const diasFalta=Math.round((dataTarefa-HOJE)/(1000*60*60*24));
      // Só mostra tarefas futuras próximas (até 15 dias) ou já vencidas (até 5 dias atrás)
      if(diasFalta>=-5&&diasFalta<=15){
        tarefasUrgentes.push({
          nome:ta.nome, resp:ta.resp, dias:diasFalta,
          data:fmtData(dataTarefa), selNum:s.n, alerta:ta.alerta
        });
      }
    });
  });
  // Ordena por urgência (mais perto de vencer primeiro, vencidas no topo)
  tarefasUrgentes.sort((a,b)=>a.dias-b.dias);

  document.getElementById('datas-body').innerHTML=tarefasUrgentes.slice(0,6).map(t=>{
    let cls='db-futuro';
    let quando='';
    if(t.dias<0){cls='db-urgente';quando=`atrasada há ${Math.abs(t.dias)}d`;}
    else if(t.dias===0){cls='db-urgente';quando='hoje!';}
    else if(t.dias<=3){cls='db-proximo';quando=`faltam ${t.dias}d`;}
    else if(t.dias<=7){cls='db-proximo';quando=`faltam ${t.dias}d`;}
    else{cls='db-futuro';quando=`faltam ${t.dias}d`;}
    return`<div class="data-item">
      <span class="data-badge ${cls}" style="min-width:auto;padding:2px 8px">${quando}</span>
      <span class="data-desc">${t.nome}</span>
      <span class="data-quando">${t.resp} · ${t.selNum}º Teste</span>
    </div>`;
  }).join('')||'<div class="empty">✓ Nenhuma tarefa urgente no momento</div>';
}

function renderPlaybook(){
  const sa=seletivoAtivo();
  if(!sa){document.getElementById('play-body').innerHTML='<div class="empty">Nenhum seletivo ativo</div>';document.getElementById('playbook-body').innerHTML='<div class="empty">Nenhum seletivo ativo nos próximos 15 dias</div>';return;}
  const d=parseData(sa.data);const t=getTarefas(`sel_${sa.n}`);
  const todas=todasTarefasComFase();
  const pendentes=todas.filter(ta=>!t[ta.id]);
  pendentes.sort((a,b)=>{const ordem={urgente:0,proximo:1,ok:2,neutro:3};return(ordem[prazoCor(d,a.dRel)]||3)-(ordem[prazoCor(d,b.dRel)]||3);});

  document.getElementById('play-body').innerHTML=pendentes.slice(0,6).map(ta=>{
    const cor=prazoCor(d,ta.dRel);
    return`<div class="play-row"><span class="play-fase pf-${ta.fase}">${ta.fase.toUpperCase()}</span><span class="play-nome">${ta.nome}</span><span class="play-prazo pp-${cor}">D${ta.dRel>=0?'+':''}${ta.dRel}=${fmtData(dataRel(d,ta.dRel))}</span></div>`;
  }).join('')||'<div class="empty" style="color:#22c55e">✓ Todas concluídas</div>';

  // Playbook completo (por fase)
  document.getElementById('playbook-body').innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:12px">${sa.n}º Teste — ${sa.data}</div>`+
    FASES_DEF.map(f=>{
      const faseTarefas=todas.filter(ta=>ta.fase===f.id);
      const ft=faseTarefas.length,fd=faseTarefas.filter(ta=>t[ta.id]).length;
      return`<div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="card-title"><span class="play-fase pf-${f.badge}" style="margin-right:6px">${f.badge.toUpperCase()}</span>${f.label}</span><span style="font-size:10px;color:#555">${fd}/${ft}</span></div>
        <div>${faseTarefas.map(ta=>{
          const checked=!!t[ta.id];
          const cor=prazoCor(d,ta.dRel);
          return`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #2a2d3a;${checked?'opacity:.45':''}">
            <div onclick="marcarTarefa('sel_${sa.n}','${ta.id}')" style="width:18px;height:18px;border-radius:4px;border:1px solid ${checked?'#22c55e':'#3a3d4a'};background:${checked?'#22c55e':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">${checked?'<span style="color:#0f1117;font-size:11px">✓</span>':''}</div>
            <span style="font-size:12px;color:#ccc;flex:1;${checked?'text-decoration:line-through':''}">${ta.nome}</span>
            <span style="font-size:10px;color:#888;flex-shrink:0">${ta.resp}</span>
            <span class="play-prazo pp-${cor}">D${ta.dRel>=0?'+':''}${ta.dRel}=${fmtData(dataRel(d,ta.dRel))}</span>
          </div>`;
        }).join('')}</div>
      </div>`;
    }).join('');
}

function renderFunil(){
  if(!leads.length){document.getElementById('funil-body').innerHTML='<div class="empty">Importe o CSV de Registros</div>';return;}
  const ativos=getLeadsFiltrados();
  const total=ativos.length;
  const contEtapa={};ativos.forEach(l=>{const e=l['Etapa']||'';contEtapa[e]=(contEtapa[e]||0)+1;});
  const maxE=Math.max(...Object.values(contEtapa),1);
  const processos=[...new Set(leads.map(l=>l['Processo seletivo']).filter(p=>p&&p!='- - -'))];
  document.getElementById('funil-proc').textContent=processos.length===1?processos[0].replace('TS ',''):`${processos.length} processos`;
  document.getElementById('funil-body').innerHTML=ETAPA_ORDER.map(et=>{
    const n=contEtapa[et]||0;if(!n)return'';
    const pct=Math.round(n/total*100);
    return`<div class="funil-row"><span class="funil-nome">${et}</span><div class="funil-bar-wrap"><div class="funil-bar" style="width:${Math.round(n/maxE*100)}%;background:${ETAPA_COR[et]||'#3b82f6'}"></div></div><span class="funil-num">${n}</span><span class="funil-pct">${pct}%</span></div>`;
  }).join('');
  const contU={};ativos.forEach(l=>{const u=(l['Unidade']||'').replace('UNIDADE ','').replace('PROPÓSITO ','');if(u&&u!='- - -')contU[u]=(contU[u]||0)+1;});
  document.getElementById('dist-unidade').innerHTML=Object.entries(contU).sort((a,b)=>b[1]-a[1]).map(([u,n])=>`<div class="dist-item"><span class="dist-label">${u}</span><span class="dist-val">${n}</span><span class="dist-pct">${Math.round(n/total*100)}%</span></div>`).join('');
  const contT={};ativos.forEach(l=>{const t=l['Turno']||'';if(t&&t!='- - -')contT[t]=(contT[t]||0)+1;});
  document.getElementById('dist-turno').innerHTML=Object.entries(contT).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<div class="dist-item"><span class="dist-label">${t}</span><span class="dist-val">${n}</span><span class="dist-pct">${Math.round(n/total*100)}%</span></div>`).join('');
}

function renderEntrevistas(){
  const proc=getProcessoSel();
  // Status reais do CSV: Atrasada, Planejada — Ganho = matriculado
  let todas=[...atividades.filter(a=>a['Status']==='Atrasada'),...atividades.filter(a=>a['Status']==='Planejada'),...atividades.filter(a=>a['Status']==='Ganho')];
  // Filtro por processo
  if(proc) todas=todas.filter(a=>pertenceAoGrupo(a['Nome - Processo seletivo'], proc));
  // Ordena por data/hora (campo Data de vencimento = hora real da entrevista)
  todas.sort((a,b)=>{
    const da=a['Data de vencimento']||''; const db=b['Data de vencimento']||'';
    if(!da)return 1; if(!db)return -1;
    return da.localeCompare(db);
  });
  if(!atividades.length){
    document.getElementById('ent-body').innerHTML='<div class="empty">Importe o CSV de Atividades</div>';
    document.getElementById('entrevistas-full').innerHTML='<div class="empty">Importe o CSV de Atividades</div>';
    return;
  }
  const cor=s=>s==='Atrasada'?'background:#2a1515;color:#ef4444':s==='Ganho'?'background:#0f2a1a;color:#22c55e':'background:#1a1f35;color:#F5C842';
  const rowHtml=a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #2a2d3a;font-size:12px">
      <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;${cor(a['Status'])}">${a['Status']}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a['Contato']}</div>
        <div style="font-size:11px;color:#555;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
          <span style="color:#aaa">${a['Segmento']||a['Nome - Oferta de curso']||''}</span>
          <span>${a['Unidade']||''}</span>
          <span style="color:#888">👤 ${a['Responsável']||'—'}</span>
          ${a['Telefone']&&a['Telefone']!='- - -'?`<span style="color:#60a5fa">📞 ${a['Telefone']}</span>`:''}
        </div>
        <div style="font-size:10px;color:#666;margin-top:2px">${a['Nome - Processo seletivo']||''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;font-weight:600;color:#F5C842">${(a['Data de vencimento']||'—').split(' ')[1]||'—'}</div>
        <div style="font-size:10px;color:#555">${(a['Data de vencimento']||'').split(' ')[0]||''}</div>
      </div>
    </div>`;
  document.getElementById('ent-body').innerHTML=todas.length?
    todas.slice(0,5).map(rowHtml).join('')+
    (todas.length>5?`<div style="font-size:11px;color:#555;text-align:center;padding:8px">+ ${todas.length-5} entrevistas na aba Entrevistas</div>`:'')
    :'<div class="empty">Nenhuma entrevista encontrada</div>';
  document.getElementById('entrevistas-full').innerHTML=todas.length?todas.map(rowHtml).join(''):'<div class="empty">Nenhuma entrevista no período selecionado</div>';
}

async function marcarTarefa(selId,taId){
  const t=getTarefas(selId);t[taId]=!t[taId];
  await supa.salvarTarefa(selId,taId,t[taId]);
  renderTudo();
}

function mudarTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['painel','funil','playbook','entrevistas'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}
