<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrevistas — Propósito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#1a1d27;border-bottom:1px solid #2a2d3a;position:sticky;top:0;z-index:50}
  .nav-logo{color:#F5C842;font-size:14px;font-weight:700}
  .nav-modulo{font-size:12px;color:#888;background:#12141e;padding:3px 10px;border-radius:20px;border:1px solid #2a2d3a}
  .nav-back{font-size:12px;color:#888;background:none;border:1px solid #2a2d3a;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit}
  .nav-back:hover{color:#F5C842;border-color:#F5C842}
  .main{max-width:900px;margin:0 auto;padding:1.25rem 1rem 4rem}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
  .page-title{font-size:20px;font-weight:700;color:#fff}
  .page-sub{font-size:12px;color:#666;margin-top:2px}
  .tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#1a1d27;border-radius:8px;padding:4px;border:1px solid #2a2d3a}
  .tab{flex:1;padding:7px 6px;border:none;background:transparent;border-radius:6px;font-size:12px;font-weight:500;color:#888;cursor:pointer;text-align:center;font-family:inherit}
  .tab.active{background:#252840;color:#fff;border:1px solid #2a2d3a}
  .panel{display:none}.panel.active{display:block}

  .filtro-unid{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #2a2d3a;background:#1a1d27;color:#fff;font-family:inherit}

  /* KPI */
  .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
  @media(max-width:560px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
  .kpi{background:#1a1d27;border-radius:8px;padding:10px 12px;border:1px solid #2a2d3a}
  .kpi-label{font-size:10px;color:#555;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
  .kpi-val{font-size:19px;font-weight:700;color:#fff}
  .kpi-sub{font-size:10px;color:#666;margin-top:1px}
  .kpi.success .kpi-val{color:#22c55e}
  .kpi.warning .kpi-val{color:#f59e0b}
  .kpi.danger .kpi-val{color:#ef4444}
  .kpi.accent .kpi-val{color:#F5C842}

  /* LISTA */
  .lista-wrap{background:#1a1d27;border-radius:10px;border:1px solid #2a2d3a;overflow:hidden}
  .ent-row{padding:11px 16px;border-bottom:1px solid #2a2d3a;font-size:12px}
  .ent-row:last-child{border-bottom:none}
  .ent-row:hover{background:#1f2235}
  .ent-top{display:flex;align-items:center;gap:10px}
  .sp{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .sp-atrasada{background:#2a1515;color:#ef4444}
  .sp-planejada{background:#1a1f35;color:#F5C842}
  .sp-ganho{background:#0f2a1a;color:#22c55e}
  .r-nome{font-size:13px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .r-sub{font-size:11px;color:#555;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .r-data{text-align:right;flex-shrink:0}
  .r-hora{font-size:13px;font-weight:600;color:#F5C842}
  .r-dia{font-size:10px;color:#555}
  .ent-controls{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
  .modal-btn{font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #2a2d3a;background:#12141e;color:#888;cursor:pointer;font-family:inherit}
  .modal-btn:hover{background:#1f2235}
  .modal-btn.on{border-color:#F5C842;background:#1a1f35;color:#F5C842}
  .link-input{font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #2a2d3a;background:#12141e;color:#60a5fa;flex:1;min-width:140px;font-family:inherit}
  .copy-btn{font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #22c55e;background:#0f2a1a;color:#4ade80;cursor:pointer;font-family:inherit}

  /* Filtros */
  .filtros{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
  .f-btn{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid #2a2d3a;background:#1a1d27;color:#888;cursor:pointer;font-weight:500;font-family:inherit}
  .f-btn.active{background:#1a1f35;color:#F5C842;border-color:#F5C842}

  /* Lista do dia */
  .ld-grupo{background:#1a1d27;border-radius:10px;border:1px solid #2a2d3a;overflow:hidden;margin-bottom:10px}
  .ld-head{padding:10px 14px;background:#1f2235;border-bottom:1px solid #2a2d3a;font-size:13px;font-weight:600;color:#ddd;display:flex;justify-content:space-between}
  .copy-list-btn{font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid #2a2d3a;background:#1a1d27;color:#888;cursor:pointer;font-family:inherit}
  .copy-list-btn:hover{border-color:#F5C842;color:#F5C842}

  .empty{padding:24px;text-align:center;font-size:13px;color:#555}
  #auth-check{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0f1117;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
</style>
</head>
<body>
<div id="auth-check">
  <div style="font-size:32px">🔒</div>
  <div style="color:#fff;font-size:16px;font-weight:600">Acesso restrito</div>
  <a href="index.html" style="margin-top:8px;padding:10px 20px;background:#F5C842;color:#0f1117;border-radius:8px;font-weight:600;font-size:13px;text-decoration:none">Ir para o menu</a>
</div>
<nav class="nav">
  <div class="nav-logo">🎯 Propósito</div>
  <span class="nav-modulo">📋 Entrevistas</span>
  <button class="nav-back" onclick="window.location.href='index.html'">← Menu</button>
</nav>
<div class="main">
  <div class="top-bar">
    <div>
      <div class="page-title">Gestão de entrevistas</div>
      <div class="page-sub" id="data-hoje"></div>
    </div>
    <select class="filtro-unid" id="filtro-unid" onchange="renderTudo()">
      <option value="">Todas as unidades</option>
    </select>
  </div>

  <div class="kpi-strip" id="kpi-strip"></div>
  <div class="kpi-strip" id="kpi-strip-resultado" style="margin-top:-8px"></div>

  <div class="tabs">
    <button class="tab active" onclick="mudarTab('todas')">📋 Todas</button>
    <button class="tab" onclick="mudarTab('alertas')">⚠️ Atrasadas <span id="badge-al" style="background:#2a1515;color:#ef4444;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:2px"></span></button>
    <button class="tab" onclick="mudarTab('dia')">📄 Lista do dia</button>
  </div>

  <div class="panel active" id="panel-todas">
    <div class="filtros" id="filtros-todas"></div>
    <div class="lista-wrap" id="todas-lista"></div>
  </div>

  <div class="panel" id="panel-alertas">
    <div class="lista-wrap" id="alertas-lista"></div>
  </div>

  <div class="panel" id="panel-dia">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:600;color:#ddd">Entrevistas de hoje — por unidade</div>
      <button class="copy-list-btn" onclick="copiarLista()">📋 Copiar para WhatsApp</button>
    </div>
    <div id="lista-dia-body"></div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
if(sessionStorage.getItem('acesso_entrevistas')!=='1'){document.getElementById('auth-check').style.display='flex';}

const HOJE=new Date();HOJE.setHours(0,0,0,0);
document.getElementById('data-hoje').textContent=HOJE.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

let atividades=[];
let propostas=[];
let filtroTodas='todas';

function fmtDataHora(dv){
  const partes=(dv||'').split(' ');
  return {data:partes[0]||'', hora:partes[1]||'—'};
}

function getPropostaAuto(nome){
  if(!nome) return null;
  return propostas.find(p=>{
    const nomeP=(p['Aluno']||'').toLowerCase().trim();
    const nomeA=nome.toLowerCase().trim();
    return nomeP===nomeA||nomeP.includes(nomeA)||nomeA.includes(nomeP);
  })||null;
}

async function init(){
  atividades = await supa.getAtividades();
  propostas = await supa.getPropostas();
  popularUnidades();
  renderTudo();
}

function popularUnidades(){
  const unidades=[...new Set(atividades.map(a=>a['Unidade']).filter(Boolean))].sort();
  const sel=document.getElementById('filtro-unid');
  const atual=sel.value;
  sel.innerHTML='<option value="">Todas as unidades</option>'+unidades.map(u=>`<option ${u===atual?'selected':''}>${u}</option>`).join('');
}

function getAtividadesFiltradas(){
  const u=document.getElementById('filtro-unid').value;
  // Entrevistas de interesse: as que têm etapa de entrevista ou proposta (não leads ainda no início do funil)
  let lista=atividades.filter(a=>['Atrasada','Planejada','Ganho'].includes(a['Status']));
  if(u) lista=lista.filter(a=>a['Unidade']===u);
  return lista;
}

function renderTudo(){renderKPIs();renderTodas();renderAlertas();renderListaDia();}

function renderKPIs(){
  const lista=getAtividadesFiltradas();
  const hoje=lista.filter(a=>{
    const {data}=fmtDataHora(a['Data de vencimento']);
    const d=parseData(data);
    return d && d.getTime()===HOJE.getTime();
  });
  const atrasadas=lista.filter(a=>a['Status']==='Atrasada').length;
  const planejadas=lista.filter(a=>a['Status']==='Planejada').length;
  const ganhas=lista.filter(a=>a['Status']==='Ganho').length;
  const semTel=lista.filter(a=>!a['Telefone']||a['Telefone']==='- - -').length;
  document.getElementById('kpi-strip').innerHTML=`
    <div class="kpi accent"><div class="kpi-label">Total</div><div class="kpi-val">${lista.length}</div><div class="kpi-sub">${hoje.length} hoje</div></div>
    <div class="kpi danger"><div class="kpi-label">Atrasadas</div><div class="kpi-val">${atrasadas}</div><div class="kpi-sub">precisam de ação</div></div>
    <div class="kpi warning"><div class="kpi-label">Planejadas</div><div class="kpi-val">${planejadas}</div><div class="kpi-sub">agendadas</div></div>
    <div class="kpi success"><div class="kpi-label">Ganhas</div><div class="kpi-val">${ganhas}</div><div class="kpi-sub">convertidas</div></div>
    <div class="kpi ${semTel>0?'warning':'success'}"><div class="kpi-label">Sem telefone</div><div class="kpi-val">${semTel}</div><div class="kpi-sub">de ${lista.length}</div></div>`;
  document.getElementById('badge-al').textContent=atrasadas||'';

  // Segunda linha: resultado das entrevistas realizadas
  const comProposta=lista.filter(a=>getPropostaAuto(a['Contato'])||a['Resultado']==='sucesso').length;
  const reagendou=lista.filter(a=>a['Resultado']==='reagendou').length;
  const semRetorno=lista.filter(a=>a['Resultado']==='sem_retorno').length;
  const desistiu=lista.filter(a=>a['Resultado']==='desistiu').length;
  const pendente=lista.filter(a=>!getPropostaAuto(a['Contato'])&&!a['Resultado']&&a['Status']!=='Atrasada'&&a['Status']!=='Planejada').length;
  const outro=lista.filter(a=>a['Resultado']==='outro').length;
  document.getElementById('kpi-strip-resultado').innerHTML=`
    <div class="kpi success"><div class="kpi-label">✅ Deu certo</div><div class="kpi-val">${comProposta}</div><div class="kpi-sub">proposta cadastrada</div></div>
    <div class="kpi warning"><div class="kpi-label">🔁 Reagendou</div><div class="kpi-val">${reagendou}</div></div>
    <div class="kpi"><div class="kpi-label">📵 Sem retorno</div><div class="kpi-val">${semRetorno}</div></div>
    <div class="kpi danger"><div class="kpi-label">❌ Desistiu</div><div class="kpi-val">${desistiu}</div></div>
    <div class="kpi"><div class="kpi-label">✏️ Outro</div><div class="kpi-val">${outro}</div></div>`;
}

function parseData(str){
  if(!str)return null;
  const m=str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(!m)return null;
  const d=new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  d.setHours(0,0,0,0);
  return d;
}

function cor(status){
  return status==='Atrasada'?'sp-atrasada':status==='Ganho'?'sp-ganho':'sp-planejada';
}

function rowHtml(a){
  const {data,hora}=fmtDataHora(a['Data de vencimento']);
  const isOnline=a['Modalidade']==='online';
  const nomeC=(a['Contato']||'').replace(/'/g,"\\'");
  const linkSafe=(a['Link']||'').replace(/'/g,"\\'");
  const propAuto=getPropostaAuto(a['Contato']);
  const resultado=a['Resultado']||'';

  let resultadoHtml='';
  if(propAuto){
    resultadoHtml=`<div style="background:#0f2a1a;border:1px solid #22c55e;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#4ade80;display:flex;align-items:center;gap:6px">
      ✅ <strong>Proposta cadastrada</strong> <span style="color:#22c55e88">— detectado automaticamente no arquivo de propostas</span>
    </div>`;
  } else if(resultado==='sucesso'){
    resultadoHtml=`<div style="background:#0f2a1a;border:1px solid #22c55e;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#4ade80;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>✅ <strong>Proposta cadastrada</strong> — marcado manualmente</span>
      <button type="button" onclick="limparResultado('${a['_id']}')" style="font-size:10px;color:#4ade8088;background:none;border:none;cursor:pointer;font-family:inherit">desfazer</button>
    </div>`;
  } else if(resultado==='reagendou'){
    resultadoHtml=`<div style="background:#1a1500;border:1px solid #f59e0b;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#fbbf24;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>🔁 <strong>Cliente reagendou</strong>${a['ResultadoObs']?' — '+a['ResultadoObs']:''}</span>
      <button type="button" onclick="limparResultado('${a['_id']}')" style="font-size:10px;color:#fbbf2488;background:none;border:none;cursor:pointer;font-family:inherit">desfazer</button>
    </div>`;
  } else if(resultado==='sem_retorno'){
    resultadoHtml=`<div style="background:#1a1d27;border:1px solid #555;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#999;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>📵 <strong>Não foi e sem retorno</strong>${a['ResultadoObs']?' — '+a['ResultadoObs']:''}</span>
      <button type="button" onclick="limparResultado('${a['_id']}')" style="font-size:10px;color:#99999988;background:none;border:none;cursor:pointer;font-family:inherit">desfazer</button>
    </div>`;
  } else if(resultado==='desistiu'){
    resultadoHtml=`<div style="background:#2a1515;border:1px solid #ef4444;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#f87171;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>❌ <strong>Cliente desistiu</strong>${a['ResultadoObs']?' — '+a['ResultadoObs']:''}</span>
      <button type="button" onclick="limparResultado('${a['_id']}')" style="font-size:10px;color:#f8717188;background:none;border:none;cursor:pointer;font-family:inherit">desfazer</button>
    </div>`;
  } else if(resultado==='outro'){
    resultadoHtml=`<div style="background:#1a1d27;border:1px solid #2a2d3a;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:#aaa;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>✏️ <strong>${a['ResultadoObs']||'Outro motivo'}</strong></span>
      <button type="button" onclick="limparResultado('${a['_id']}')" style="font-size:10px;color:#aaaaaa88;background:none;border:none;cursor:pointer;font-family:inherit">desfazer</button>
    </div>`;
  } else {
    resultadoHtml=`<div style="margin-top:8px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:5px">Resultado da entrevista</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button type="button" onclick="marcarResultado('${a['_id']}','sucesso')" style="font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #22c55e;background:#0f2a1a;color:#4ade80;cursor:pointer;font-family:inherit">✅ Deu certo</button>
        <button type="button" onclick="marcarResultado('${a['_id']}','reagendou')" style="font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #f59e0b;background:#1a1500;color:#fbbf24;cursor:pointer;font-family:inherit">🔁 Reagendou</button>
        <button type="button" onclick="marcarResultado('${a['_id']}','sem_retorno')" style="font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #555;background:#1a1d27;color:#999;cursor:pointer;font-family:inherit">📵 Sem retorno</button>
        <button type="button" onclick="marcarResultado('${a['_id']}','desistiu')" style="font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #ef4444;background:#2a1515;color:#f87171;cursor:pointer;font-family:inherit">❌ Desistiu</button>
        <button type="button" onclick="marcarOutro('${a['_id']}')" style="font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid #2a2d3a;background:#12141e;color:#888;cursor:pointer;font-family:inherit">✏️ Outro</button>
      </div>
    </div>`;
  }

  return`<div class="ent-row">
    <div class="ent-top">
      <span class="sp ${cor(a['Status'])}">${a['Status']}</span>
      <div style="flex:1;min-width:0">
        <div class="r-nome">${a['Contato']}</div>
        <div class="r-sub">
          <span style="color:#aaa">${a['Segmento']||a['Nome - Oferta de curso']||''}</span>
          <span>${a['Unidade']||''}</span>
          <span style="color:#888">👤 ${a['Responsável']||'—'}</span>
          ${a['Telefone']&&a['Telefone']!='- - -'?`<span style="color:#60a5fa">📞 ${a['Telefone']}</span>`:'<span style="color:#555">📞 sem telefone</span>'}
        </div>
        <div style="font-size:10px;color:#666;margin-top:2px">${a['Nome - Processo seletivo']||''}</div>
      </div>
      <div class="r-data">
        <div class="r-hora">${hora}</div>
        <div class="r-dia">${data}</div>
      </div>
    </div>
    <div class="ent-controls">
      <button type="button" class="modal-btn ${isOnline?'on':''}" onclick="toggleModalidade('${a['_id']}',${!isOnline})">${isOnline?'🖥️ Online':'🏢 Presencial'}</button>
      ${isOnline?`
        <input type="text" class="link-input" placeholder="Cole o link do Meet..." value="${a['Link']||''}" onchange="salvarLinkMeet('${a['_id']}',this.value)">
        ${a['Link']?`<button type="button" class="copy-btn" onclick="copiarMsgEntrevista('${nomeC}','${data}','${hora}','${linkSafe}')">📋 Copiar mensagem</button>`:''}
      `:''}
    </div>
    ${resultadoHtml}
  </div>`;
}

async function marcarResultado(id, resultado, obs){
  await supa.atualizarAtividade(id, {resultado, resultado_obs: obs||null});
  const a=atividades.find(x=>String(x['_id'])===String(id));
  if(a){a['Resultado']=resultado;a['ResultadoObs']=obs||'';}
  renderTudo();
}

function marcarOutro(id){
  const motivo=prompt('Descreva o motivo:');
  if(motivo===null)return;
  marcarResultado(id,'outro',motivo);
}

async function limparResultado(id){
  await supa.atualizarAtividade(id, {resultado:null, resultado_obs:null});
  const a=atividades.find(x=>String(x['_id'])===String(id));
  if(a){a['Resultado']='';a['ResultadoObs']='';}
  renderTudo();
}

function renderTodas(){
  const lista=getAtividadesFiltradas();
  const filtros=[
    {id:'todas',label:`Todas (${lista.length})`},
    {id:'atrasadas',label:`Atrasadas (${lista.filter(a=>a['Status']==='Atrasada').length})`},
    {id:'planejadas',label:`Planejadas (${lista.filter(a=>a['Status']==='Planejada').length})`},
    {id:'online',label:`Online (${lista.filter(a=>a['Modalidade']==='online').length})`},
    {id:'sem-tel',label:`Sem telefone (${lista.filter(a=>!a['Telefone']||a['Telefone']==='- - -').length})`},
    {id:'sucesso',label:`✅ Deu certo (${lista.filter(a=>getPropostaAuto(a['Contato'])||a['Resultado']==='sucesso').length})`},
    {id:'sem-resultado',label:`Sem resultado (${lista.filter(a=>!getPropostaAuto(a['Contato'])&&!a['Resultado']).length})`},
  ];
  document.getElementById('filtros-todas').innerHTML=filtros.map(f=>`
    <button type="button" class="f-btn ${filtroTodas===f.id?'active':''}" onclick="setFiltro('${f.id}')">${f.label}</button>`).join('');

  let fl=lista;
  if(filtroTodas==='atrasadas')fl=lista.filter(a=>a['Status']==='Atrasada');
  if(filtroTodas==='planejadas')fl=lista.filter(a=>a['Status']==='Planejada');
  if(filtroTodas==='online')fl=lista.filter(a=>a['Modalidade']==='online');
  if(filtroTodas==='sem-tel')fl=lista.filter(a=>!a['Telefone']||a['Telefone']==='- - -');
  if(filtroTodas==='sucesso')fl=lista.filter(a=>getPropostaAuto(a['Contato'])||a['Resultado']==='sucesso');
  if(filtroTodas==='sem-resultado')fl=lista.filter(a=>!getPropostaAuto(a['Contato'])&&!a['Resultado']);

  fl=[...fl].sort((a,b)=>(a['Data de vencimento']||'').localeCompare(b['Data de vencimento']||''));
  document.getElementById('todas-lista').innerHTML=fl.length?fl.map(rowHtml).join(''):'<div class="empty">Nenhuma entrevista nesta categoria. Importe o CSV de Atividades no Painel do Gerente.</div>';
}

function renderAlertas(){
  const lista=getAtividadesFiltradas().filter(a=>a['Status']==='Atrasada');
  const sorted=[...lista].sort((a,b)=>(a['Data de vencimento']||'').localeCompare(b['Data de vencimento']||''));
  document.getElementById('alertas-lista').innerHTML=sorted.length?sorted.map(rowHtml).join(''):'<div class="empty">✓ Nenhuma entrevista atrasada</div>';
}

function renderListaDia(){
  const lista=getAtividadesFiltradas().filter(a=>{
    const {data}=fmtDataHora(a['Data de vencimento']);
    const d=parseData(data);
    return d && d.getTime()===HOJE.getTime();
  });
  if(!lista.length){document.getElementById('lista-dia-body').innerHTML='<div class="empty">Nenhuma entrevista hoje</div>';return;}
  const por={};
  lista.forEach(a=>{const u=a['Unidade']||'Sem unidade';if(!por[u])por[u]=[];por[u].push(a);});
  document.getElementById('lista-dia-body').innerHTML=Object.entries(por).map(([u,items])=>{
    const sorted=[...items].sort((a,b)=>(a['Data de vencimento']||'').localeCompare(b['Data de vencimento']||''));
    return`<div class="ld-grupo">
      <div class="ld-head"><span>${u}</span><span style="color:#666;font-size:12px">${items.length} entrevistas</span></div>
      ${sorted.map(rowHtml).join('')}
    </div>`;
  }).join('');
}

function setFiltro(f){filtroTodas=f;renderTodas();}

async function toggleModalidade(id, novoOnline){
  await supa.atualizarAtividade(id, {modalidade: novoOnline?'online':'presencial'});
  const a=atividades.find(x=>String(x['_id'])===String(id));
  if(a) a['Modalidade']=novoOnline?'online':'presencial';
  renderTudo();
}

async function salvarLinkMeet(id, link){
  await supa.atualizarAtividade(id, {link_meet: link});
  const a=atividades.find(x=>String(x['_id'])===String(id));
  if(a) a['Link']=link;
  renderTudo();
}

function copiarMsgEntrevista(nome,data,hora,link){
  const msg=`Olá ${nome}! Sua entrevista está agendada para ${data} às ${hora} — modalidade online.\nLink da reunião: ${link}`;
  navigator.clipboard.writeText(msg).then(()=>alert('✓ Mensagem copiada! Cole no WhatsApp.')).catch(()=>alert('Não foi possível copiar automaticamente.'));
}

function copiarLista(){
  const lista=getAtividadesFiltradas().filter(a=>{
    const {data}=fmtDataHora(a['Data de vencimento']);
    const d=parseData(data);
    return d && d.getTime()===HOJE.getTime();
  });
  if(!lista.length){alert('Nenhuma entrevista hoje');return;}
  const por={};
  lista.forEach(a=>{const u=a['Unidade']||'Sem unidade';if(!por[u])por[u]=[];por[u].push(a);});
  let txt=`📋 *Entrevistas — ${HOJE.toLocaleDateString('pt-BR')}*\n\n`;
  Object.entries(por).forEach(([u,items])=>{
    txt+=`*${u}*\n`;
    const sorted=[...items].sort((a,b)=>(a['Data de vencimento']||'').localeCompare(b['Data de vencimento']||''));
    sorted.forEach(a=>{
      const {hora}=fmtDataHora(a['Data de vencimento']);
      txt+=`${hora} · ${a['Contato']} · ${a['Segmento']||''} · ${a['Responsável']||''}${a['Modalidade']==='online'?' (Online)':''}\n`;
    });
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>alert('✓ Copiado! Cole no WhatsApp.')).catch(()=>alert('Selecione e copie manualmente.'));
}

function mudarTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['todas','alertas','dia'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

init();
</script>
